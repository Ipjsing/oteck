<!DOCTYPE html>
<html lang="en">
    <head>
    <meta charset="UTF-8">
     <meta name="viewpoint" content="width=device-width, initial-scale=1.0">
     <title>container</title>
    </head>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .container{
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
        main{
            border: 1px solid red;
            padding: 50px 10px;
            width: 350px;
        }
        aside{
            border: 1px solid red;
            padding: 50px 10px;
            width: 350px;
        }
        section{
            border: 1px solid red;
            padding: 50px 10px;
            width: 350px;
        }
        section{ 
        }
        section button{
            font-size: 18px;
            border: none;
            background-color: #548954;
            padding: 5px 20px;
            color: #fff;
            border-radius: 5px;
            margin: 30px 0px 0px 0px;
        }

    </style>
    <body>
        <div class="container">
            <main>
                <h2>Main</h2>
            </main>

            <aside>
                <h2>Aside</h2>
            </aside>

            <section>
                <h2>Section</h2>
            </section>
        </div>
    </body>    
</html>
