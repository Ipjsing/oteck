<!DOCTYPE html>
<html lang="en">
    <meta charset="UTF-8">
    <meta name="viewpoint" content="width=device-width, initial-scale=1.0">
    <head>
        <title>layout plan</title>
    </head>
    <style>
        *{
            margin: 0;
            padding: 0;
    
        }
        .container{
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content:space-around;
            align-items: center;
        }
        nav{
            border: 1px solid blue;
            padding: 100px 29px;
            background-color: aqua;
        }
        main{
            border: 1px solid blue;
            padding: 100px 26px;
            background-color: chocolate;
        }
        aside{
            border: 1px solid blue;
            padding: 100px 23px;
            background-color: darkgreen;
        }
        footer{
            border: 1px solid blue;
            padding: 100px 20px;
            background-color: chartreuse;
        }
    </style>
     <body>
        <div class="container">
        <nav>
            <h2>Nav</h2>
        </nav>

        <main>
            <h2>Main</h2>
        </main>

        <aside>
            <h2>Aside</h2>
        </aside>

        <footer>
            <h2>Footer</h2>
        </footer>
        </div>
     </body>  
</html>
